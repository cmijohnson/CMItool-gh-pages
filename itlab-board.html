    <style>

      /* Animations */
      @keyframes fadeInUp {

        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes fadeIn {

        font-family: 'JetBrains Mono', monospace;

      .dark .markdown-body code {
        background: rgba(255,255,255,0.1);
      }
      .markdown-body pre {
        background: #1e293b;
        color: #e2e8f0;
        padding: 1em;
        border-radius: 12px;
        overflow-x: auto;
        margin-bottom: 1em;
      }
      .markdown-body pre code {
        background: none;
        padding: 0;
        color: inherit;
      }
      .markdown-body blockquote {
        border-left: 4px solid #5c7cfa;
        padding-left: 1em;
        margin-left: 0;
        margin-bottom: 0.75em;
        color: #64748b;

        width: 100%;

        border: 1px solid #e2e8f0;
        padding: 0.5em;
        text-align: left;
      }
      .dark .markdown-body th, .dark .markdown-body td {
        border-color: #334155;
      }
      .markdown-body th {
        background: #f1f5f9;

      }

        background: #1e293b;

      .cat-sre { background: linear-gradient(135deg, #10b981, #059669); }

      /* Tag Styles */

      }
      .dark .tag {
        background: rgba(92, 124, 250, 0.2);
        color: #748ffc;

      /* Online indicator */
      .online-dot {
        width: 8px;
        height: 8px;
        background: #10b981;
        border-radius: 50%;

      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }

      /* No scrollbar utility */
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-zinc-50 dark:bg-[#0a0a0f] text-zinc-900 dark:text-white transition-colors duration-300 min-h-screen">

    <!-- Background -->
    <div class="fixed inset-0 pointer-events-none -z-10">
        <div class="absolute top-0 left-1/4 w-[600px] h-[600px] bg-brand-600/10 rounded-full blur-[120px]"></div>
        <div class="absolute bottom-0 right-1/4 w-[500px] h-[500px] bg-purple-600/10 rounded-full blur-[100px]"></div>
    </div>

    <!-- Header -->
    <header class="fixed top-0 left-0 right-0 z-50 backdrop-blur-3xl bg-white/80 dark:bg-[#0a0a0f]/80 border-b border-zinc-200 dark:border-white/5">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <!-- Logo -->
                <div class="flex items-center gap-3">
                    <a href="index.html" class="flex items-center gap-2 text-zinc-400 hover:text-zinc-600 dark:hover:text-white transition-colors">
                        <i data-lucide="arrow-left" size="18"></i>
                        <span class="text-xs font-bold uppercase tracking-widest hidden sm:inline">返回</span>
                    </a>
                    <div class="w-px h-6 bg-zinc-200 dark:bg-white/10 mx-2"></div>
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-brand-500 to-purple-600 flex items-center justify-center text-white shadow-lg shadow-brand-500/20">
                            <i data-lucide="terminal" size="20"></i>
                        </div>
                        <div>
                            <h1 class="text-lg font-black tracking-tight">ITLab 留言板</h1>
                            <p class="text-[10px] text-zinc-400 font-bold uppercase tracking-widest">SRE · 网安 · 运维</p>

                <!-- Right side -->

                    <!-- User Menu -->
                    <div id="user-section" class="relative">

                            </button>

                                <div id="admin-link" class="hidden">

    <!-- Login Modal -->
    <div id="login-modal" class="hidden fixed inset-0 z-[100] bg-black/50 backdrop-blur-sm flex items-center justify-center px-4">

            <div class="p-6 border-b border-zinc-200 dark:border-white/10 flex items-center justify-between">
                <h2 class="text-xl font-black">登录 ITLab</h2>
                <button onclick="hideLoginModal()" class="p-1 text-zinc-400 hover:text-zinc-600"><i data-lucide="x"></i></button>
            </div>

                <button onclick="githubLogin()" class="w-full py-3 rounded-xl bg-[#24292f] dark:bg-white/10 text-white font-bold text-sm hover:bg-[#2f363d] dark:hover:bg-white/20 transition-colors flex items-center justify-center gap-2">
                    <svg class="w-5 h-5" fill="white" viewBox="0 0 24 24"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>

            </div>
        </div>
    </div>

    <!-- New Post Modal -->
    <div id="new-post-modal" class="hidden fixed inset-0 z-[100] bg-black/50 backdrop-blur-sm flex items-center justify-center px-4 py-8">
        <div class="w-full max-w-2xl bg-white dark:bg-zinc-900 rounded-2xl shadow-2xl overflow-hidden border border-zinc-200 dark:border-white/10 animate-fade-in-up max-h-[90vh] flex flex-col">
            <div class="p-6 border-b border-zinc-200 dark:border-white/10 flex items-center justify-between flex-shrink-0">
                <h2 class="text-xl font-black">发布新帖子</h2>
                <button onclick="hideNewPostModal()" class="p-1 text-zinc-400 hover:text-zinc-600"><i data-lucide="x"></i></button>
            </div>
            <div class="p-6 space-y-4 overflow-y-auto flex-1">
                <div>
                    <label class="block text-xs font-bold text-zinc-500 mb-2">标题</label>
                    <input type="text" id="post-title" class="w-full px-4 py-3 rounded-xl bg-zinc-100 dark:bg-white/5 border border-zinc-200 dark:border-white/10 outline-none focus:border-brand-500 transition-colors" placeholder="输入帖子标题...">
                </div>
                <div>
                    <label class="block text-xs font-bold text-zinc-500 mb-2">分类</label>
                    <div class="flex flex-wrap gap-2" id="post-categories">
                        <button onclick="selectCategory('sre')" class="category-btn px-3 py-1.5 rounded-lg text-xs font-bold bg-zinc-100 dark:bg-white/5 text-zinc-500 hover:bg-emerald-100 hover:text-emerald-600 dark:hover:bg-emerald-900/20 dark:hover:text-emerald-400 transition-colors" data-cat="sre">SRE</button>
                        <button onclick="selectCategory('security')" class="category-btn px-3 py-1.5 rounded-lg text-xs font-bold bg-zinc-100 dark:bg-white/5 text-zinc-500 hover:bg-red-100 hover:text-red-600 dark:hover:bg-red-900/20 dark:hover:text-red-400 transition-colors" data-cat="security">网安</button>
                        <button onclick="selectCategory('devops')" class="category-btn px-3 py-1.5 rounded-lg text-xs font-bold bg-zinc-100 dark:bg-white/5 text-zinc-500 hover:bg-amber-100 hover:text-amber-600 dark:hover:bg-amber-900/20 dark:hover:text-amber-400 transition-colors" data-cat="devops">运维</button>
                        <button onclick="selectCategory('frontend')" class="category-btn px-3 py-1.5 rounded-lg text-xs font-bold bg-zinc-100 dark:bg-white/5 text-zinc-500 hover:bg-blue-100 hover:text-blue-600 dark:hover:bg-blue-900/20 dark:hover:text-blue-400 transition-colors" data-cat="frontend">前端</button>
                        <button onclick="selectCategory('backend')" class="category-btn px-3 py-1.5 rounded-lg text-xs font-bold bg-zinc-100 dark:bg-white/5 text-zinc-500 hover:bg-violet-100 hover:text-violet-600 dark:hover:bg-violet-900/20 dark:hover:text-violet-400 transition-colors" data-cat="backend">后端</button>
                        <button onclick="selectCategory('ai')" class="category-btn px-3 py-1.5 rounded-lg text-xs font-bold bg-zinc-100 dark:bg-white/5 text-zinc-500 hover:bg-pink-100 hover:text-pink-600 dark:hover:bg-pink-900/20 dark:hover:text-pink-400 transition-colors" data-cat="ai">AI</button>
                        <button onclick="selectCategory('other')" class="category-btn px-3 py-1.5 rounded-lg text-xs font-bold bg-zinc-100 dark:bg-white/5 text-zinc-500 hover:bg-gray-100 hover:text-gray-600 dark:hover:bg-gray-900/20 dark:hover:text-gray-400 transition-colors" data-cat="other">杂谈</button>
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-zinc-500 mb-2">标签（用逗号分隔）</label>
                    <input type="text" id="post-tags" class="w-full px-4 py-3 rounded-xl bg-zinc-100 dark:bg-white/5 border border-zinc-200 dark:border-white/10 outline-none focus:border-brand-500 transition-colors" placeholder="例如: Linux, Docker, Kubernetes">
                </div>
                <div>
                    <label class="block text-xs font-bold text-zinc-500 mb-2">内容（支持 Markdown）</label>
                    <div class="flex gap-2 mb-2">
                        <button onclick="insertMarkdown('bold')" class="p-1.5 rounded-lg bg-zinc-100 dark:bg-white/5 text-zinc-500 hover:bg-zinc-200 dark:hover:bg-white/10 transition-colors" title="粗体"><b>B</b></button>
                        <button onclick="insertMarkdown('italic')" class="p-1.5 rounded-lg bg-zinc-100 dark:bg-white/5 text-zinc-500 hover:bg-zinc-200 dark:hover:bg-white/10 transition-colors" title="斜体"><i>I</i></button>
                        <button onclick="insertMarkdown('code')" class="p-1.5 rounded-lg bg-zinc-100 dark:bg-white/5 text-zinc-500 hover:bg-zinc-200 dark:hover:bg-white/10 transition-colors" title="代码"><code>&lt;/&gt;</code></button>
                        <button onclick="insertMarkdown('codeblock')" class="p-1.5 rounded-lg bg-zinc-100 dark:bg-white/5 text-zinc-500 hover:bg-zinc-200 dark:hover:bg-white/10 transition-colors" title="代码块">```</button>
                        <button onclick="insertMarkdown('link')" class="p-1.5 rounded-lg bg-zinc-100 dark:bg-white/5 text-zinc-500 hover:bg-zinc-200 dark:hover:bg-white/10 transition-colors" title="链接"><i data-lucide="link" size="14"></i></button>
                        <button onclick="insertMarkdown('image')" class="p-1.5 rounded-lg bg-zinc-100 dark:bg-white/5 text-zinc-500 hover:bg-zinc-200 dark:hover:bg-white/10 transition-colors" title="图片"><i data-lucide="image" size="14"></i></button>

                <div>
                    <label class="block text-xs font-bold text-zinc-500 mb-2">预览</label>

                    </div>
                </div>
            </div>
            <div class="p-6 border-t border-zinc-200 dark:border-white/10 flex justify-end gap-3 flex-shrink-0">

    <!-- Main Content -->
    <main class="pt-20 pb-8 px-4 sm:px-6 lg:px-8 max-w-7xl mx-auto">

            <p class="text-zinc-500 dark:text-zinc-400 text-sm max-w-md mx-auto">
                SRE · 网络安全 · 运维开发 · 前端 · 后端 · AI
            </p>
        </div>

        <!-- Toolbar -->
        <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4 mb-6">
            <!-- Categories -->
            <div class="flex flex-wrap gap-2">
                <button onclick="filterByCategory('all')" class="filter-btn px-4 py-2 rounded-xl text-xs font-bold uppercase tracking-widest transition-all bg-brand-600 text-white shadow-lg shadow-brand-600/20" data-filter="all">

                <button onclick="filterByCategory('sre')" class="filter-btn px-4 py-2 rounded-xl text-xs font-bold uppercase tracking-widest transition-all bg-zinc-100 dark:bg-white/5 text-zinc-500" data-filter="sre">

                <button onclick="filterByCategory('security')" class="filter-btn px-4 py-2 rounded-xl text-xs font-bold uppercase tracking-widest transition-all bg-zinc-100 dark:bg-white/5 text-zinc-500" data-filter="security">
                    网安

                <button onclick="filterByCategory('devops')" class="filter-btn px-4 py-2 rounded-xl text-xs font-bold uppercase tracking-widest transition-all bg-zinc-100 dark:bg-white/5 text-zinc-500" data-filter="devops">
                    运维
                </button>
                <button onclick="filterByCategory('frontend')" class="filter-btn px-4 py-2 rounded-xl text-xs font-bold uppercase tracking-widest transition-all bg-zinc-100 dark:bg-white/5 text-zinc-500" data-filter="frontend">
                    前端
                </button>
                <button onclick="filterByCategory('backend')" class="filter-btn px-4 py-2 rounded-xl text-xs font-bold uppercase tracking-widest transition-all bg-zinc-100 dark:bg-white/5 text-zinc-500" data-filter="backend">
                    后端
                </button>
                <button onclick="filterByCategory('ai')" class="filter-btn px-4 py-2 rounded-xl text-xs font-bold uppercase tracking-widest transition-all bg-zinc-100 dark:bg-white/5 text-zinc-500" data-filter="ai">
                    AI
                </button>
                <button onclick="filterByCategory('other')" class="filter-btn px-4 py-2 rounded-xl text-xs font-bold uppercase tracking-widest transition-all bg-zinc-100 dark:bg-white/5 text-zinc-500" data-filter="other">
                    杂谈
                </button>
            </div>

            <!-- Actions -->
            <div class="flex items-center gap-3">
                <div class="relative">
                    <input type="text" id="search-input" onkeyup="searchPosts()" class="w-48 px-4 py-2 pl-10 rounded-xl bg-zinc-100 dark:bg-white/5 border border-zinc-200 dark:border-white/10 outline-none focus:border-brand-500 transition-colors text-sm" placeholder="搜索帖子...">
                    <i data-lucide="search" size="14" class="absolute left-3 top-1/2 -translate-y-1/2 text-zinc-400"></i>
                </div>
                <button onclick="showNewPostModal()" id="new-post-btn" class="hidden px-4 py-2 rounded-xl bg-brand-600 text-white text-xs font-bold hover:bg-brand-700 transition-colors shadow-lg shadow-brand-600/20 flex items-center gap-2">
                    <i data-lucide="plus" size="14"></i>
                    发帖
                </button>
            </div>
        </div>

        <!-- Sort -->
        <div class="flex items-center gap-4 mb-6">
            <span class="text-xs text-zinc-400 font-bold">排序：</span>
            <button onclick="sortPosts('newest')" class="sort-btn text-xs font-bold text-brand-500" data-sort="newest">最新</button>
            <button onclick="sortPosts('popular')" class="sort-btn text-xs font-bold text-zinc-400 hover:text-zinc-600 dark:hover:text-white transition-colors" data-sort="popular">最热</button>
            <button onclick="sortPosts('active')" class="sort-btn text-xs font-bold text-zinc-400 hover:text-zinc-600 dark:hover:text-white transition-colors" data-sort="active">活跃</button>
        </div>

        <!-- Posts List -->
        <div id="posts-list" class="space-y-4">
            <div class="text-center py-20">
                <i data-lucide="loader-2" class="animate-spin inline-block text-zinc-400" size="32"></i>
                <p class="text-zinc-400 text-sm mt-4">加载中...</p>
            </div>
        </div>

        <!-- Load More -->
        <div id="load-more" class="hidden text-center mt-8">
            <button onclick="loadMorePosts()" class="px-6 py-3 rounded-xl bg-zinc-100 dark:bg-white/5 border border-zinc-200 dark:border-white/10 text-sm font-bold hover:bg-zinc-200 dark:hover:bg-white/10 transition-colors">
                加载更多
            </button>
        </div>
    </main>

    <!-- Post Detail Modal -->
    <div id="post-detail-modal" class="hidden fixed inset-0 z-[100] bg-black/50 backdrop-blur-sm flex items-center justify-center px-4 py-8">
        <div class="w-full max-w-3xl bg-white dark:bg-zinc-900 rounded-2xl shadow-2xl overflow-hidden border border-zinc-200 dark:border-white/10 animate-fade-in-up max-h-[90vh] flex flex-col">
            <div class="p-6 border-b border-zinc-200 dark:border-white/10 flex items-center justify-between flex-shrink-0">
                <h2 id="detail-title" class="text-xl font-black truncate"></h2>
                <button onclick="hidePostDetail()" class="p-1 text-zinc-400 hover:text-zinc-600 flex-shrink-0 ml-4"><i data-lucide="x"></i></button>
            </div>
            <div id="post-detail-content" class="flex-1 overflow-y-auto">
                <!-- Content loaded dynamically -->
            </div>
            <div class="p-4 border-t border-zinc-200 dark:border-white/10 flex-shrink-0">
                <div class="flex gap-3">
                    <input type="text" id="comment-input" class="flex-1 px-4 py-3 rounded-xl bg-zinc-100 dark:bg-white/5 border border-zinc-200 dark:border-white/10 outline-none focus:border-brand-500 transition-colors text-sm" placeholder="写下你的评论...">
                    <button onclick="submitComment()" class="px-6 py-3 rounded-xl bg-brand-600 text-white text-sm font-bold hover:bg-brand-700 transition-colors shadow-lg shadow-brand-600/20">发送</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="py-8 border-t border-zinc-200 dark:border-white/5">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
            <p class="text-xs text-zinc-400">
                © 2025 江苏大学 ITLab · CMI Team ·
                <a href="https://github.com/cmijohnson/CMItool-gh-pages" target="_blank" class="text-brand-500 hover:underline">GitHub</a>
            </p>
        </div>
    </footer>

    <!-- Firebase Config -->
    <script src="assets/js/firebase-config.js"></script>

    <!-- App Script -->
    <script>
        // ========== Global State ==========
        let currentUser = null;
        let currentFilter = 'all';
        let currentSort = 'newest';
        let selectedCategory = null;
        let currentPostId = null;
        let lastDoc = null;
        let isLoading = false;
        const POSTS_PER_PAGE = 20;

        // Category config
        const CATEGORIES = {
            sre: { name: 'SRE', color: 'emerald', icon: 'server' },
            security: { name: '网安', color: 'red', icon: 'shield' },
            devops: { name: '运维', color: 'amber', icon: 'settings' },
            frontend: { name: '前端', color: 'blue', icon: 'layout' },
            backend: { name: '后端', color: 'violet', icon: 'database' },
            ai: { name: 'AI', color: 'pink', icon: 'brain' },
            other: { name: '杂谈', color: 'gray', icon: 'message-circle' }
        };

        // ========== Theme ==========
        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }

        // Init theme
        if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }

        // ========== Auth ==========
        function showLoginModal() {
            document.getElementById('login-modal').classList.remove('hidden');
        }

        function hideLoginModal() {
            document.getElementById('login-modal').classList.add('hidden');
            document.getElementById('login-error').classList.add('hidden');
        }

        async function githubLogin() {
            const provider = new firebase.auth.GithubAuthProvider();
            try {
                await auth.signInWithPopup(provider);
                hideLoginModal();
            } catch (error) {
                console.error('Login failed:', error);
                if (error.code !== 'auth/popup-closed-by-user') {
                    const errorDiv = document.getElementById('login-error');
                    errorDiv.textContent = '登录失败: ' + error.message;
                    errorDiv.classList.remove('hidden');
                }
            }
        }

        async function logout() {
            try {
                await auth.signOut();
            } catch (e) {
                console.error('Logout failed:', e);
            }
        }

        // User menu
        let userMenuTimeout = null;
        function showUserMenu() {
            if (userMenuTimeout) { clearTimeout(userMenuTimeout); userMenuTimeout = null; }
            document.getElementById('user-dropdown').classList.remove('hidden');
        }
        function hideUserMenuWithDelay() {
            userMenuTimeout = setTimeout(() => {
                document.getElementById('user-dropdown').classList.add('hidden');
            }, 300);
        }

        // Auth state listener
        auth.onAuthStateChanged(async (user) => {
            currentUser = user;
            const loginBtn = document.getElementById('login-btn');
            const userMenu = document.getElementById('user-menu');
            const newPostBtn = document.getElementById('new-post-btn');

            if (user) {
                loginBtn.classList.add('hidden');
                userMenu.classList.remove('hidden');
                newPostBtn.classList.remove('hidden');
                newPostBtn.classList.add('flex');

                // Update user info
                const avatar = user.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(user.displayName || user.email)}&background=5c7cfa&color=fff`;
                document.getElementById('user-avatar').src = avatar;
                document.getElementById('user-name').textContent = user.displayName || user.email.split('@')[0];

                // Check admin
                try {
                    const userDoc = await db.collection('users').doc(user.uid).get();
                    if (userDoc.exists && userDoc.data().role === 'admin') {
                        document.getElementById('admin-link').classList.remove('hidden');
                    }
                } catch (e) {
                    console.warn('Failed to check admin:', e);
                }

                // Save user to Firestore
                await db.collection('itlab_users').doc(user.uid).set({
                    displayName: user.displayName || user.email.split('@')[0],
                    email: user.email,
                    photoURL: user.photoURL,
                    lastSeen: firebase.firestore.FieldValue.serverTimestamp()
                }, { merge: true });

            } else {
                loginBtn.classList.remove('hidden');
                userMenu.classList.add('hidden');
                newPostBtn.classList.add('hidden');
                newPostBtn.classList.remove('flex');
            }
        });

        // ========== New Post ==========
        function showNewPostModal() {
            if (!currentUser) {
                showLoginModal();
                return;
            }
            document.getElementById('new-post-modal').classList.remove('hidden');
            document.getElementById('post-title').value = '';
            document.getElementById('post-content').value = '';
            document.getElementById('post-tags').value = '';
            document.getElementById('post-preview').innerHTML = '<p class="text-zinc-400 text-sm">开始输入内容后这里会显示预览...</p>';
            selectedCategory = null;
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.classList.remove('ring-2', 'ring-brand-500', 'bg-brand-100', 'dark:bg-brand-900/30');
            });
            lucide.createIcons();
        }

        function hideNewPostModal() {
            document.getElementById('new-post-modal').classList.add('hidden');
        }

        function selectCategory(cat) {
            selectedCategory = cat;
            document.querySelectorAll('.category-btn').forEach(btn => {
                if (btn.dataset.cat === cat) {
                    btn.classList.add('ring-2', 'ring-brand-500', 'bg-brand-100', 'dark:bg-brand-900/30');
                } else {
                    btn.classList.remove('ring-2', 'ring-brand-500', 'bg-brand-100', 'dark:bg-brand-900/30');
                }
            });
        }

        function insertMarkdown(type) {
            const textarea = document.getElementById('post-content');
            const start = textarea.selectionStart;
            const end = textarea.selectionEnd;
            const text = textarea.value;
            const selected = text.substring(start, end);

            let insert = '';
            switch (type) {
                case 'bold': insert = `**${selected || '粗体文本'}**`; break;
                case 'italic': insert = `*${selected || '斜体文本'}*`; break;
                case 'code': insert = `\`${selected || '代码'}\``; break;
                case 'codeblock': insert = `\n\`\`\`\n${selected || '代码块'}\n\`\`\`\n`; break;
                case 'link': insert = `[${selected || '链接文本'}](url)`; break;
                case 'image': insert = `![${selected || '图片描述'}](url)`; break;
            }

            textarea.value = text.substring(0, start) + insert + text.substring(end);
            textarea.focus();
            textarea.selectionStart = start;
            textarea.selectionEnd = start + insert.length;
            updatePreview();
        }

        function updatePreview() {
            const content = document.getElementById('post-content').value;
            const preview = document.getElementById('post-preview');
            if (content.trim()) {
                preview.innerHTML = marked.parse(content);
                preview.querySelectorAll('pre code').forEach(block => {
                    hljs.highlightElement(block);
                });
            } else {
                preview.innerHTML = '<p class="text-zinc-400 text-sm">开始输入内容后这里会显示预览...</p>';
            }
        }

        // Preview on input
        document.getElementById('post-content').addEventListener('input', updatePreview);

        async function submitPost() {
            const title = document.getElementById('post-title').value.trim();
            const content = document.getElementById('post-content').value.trim();
            const tagsStr = document.getElementById('post-tags').value.trim();
            const tags = tagsStr ? tagsStr.split(',').map(t => t.trim()).filter(t => t) : [];

            if (!title) { alert('请输入标题'); return; }
            if (!selectedCategory) { alert('请选择分类'); return; }
            if (!content) { alert('请输入内容'); return; }

            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = true;
            submitBtn.textContent = '发布中...';

            try {
                await db.collection('itlab_posts').add({
                    title,
                    content,
                    category: selectedCategory,
                    tags,
                    authorId: currentUser.uid,
                    authorName: currentUser.displayName || currentUser.email.split('@')[0],
                    authorAvatar: currentUser.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(currentUser.displayName || currentUser.email)}&background=5c7cfa&color=fff`,
                    likes: 0,
                    likedBy: [],
                    commentCount: 0,
                    isPinned: false,
                    isFeatured: false,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                hideNewPostModal();
                loadPosts(true);
            } catch (e) {
                alert('发布失败: ' + e.message);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '发布帖子';
            }
        }

        // ========== Posts ==========
        function filterByCategory(cat) {
            currentFilter = cat;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                if (btn.dataset.filter === cat) {
                    btn.className = 'filter-btn px-4 py-2 rounded-xl text-xs font-bold uppercase tracking-widest transition-all bg-brand-600 text-white shadow-lg shadow-brand-600/20';
                } else {
                    btn.className = 'filter-btn px-4 py-2 rounded-xl text-xs font-bold uppercase tracking-widest transition-all bg-zinc-100 dark:bg-white/5 text-zinc-500';
                }
            });
            loadPosts(true);
        }

        function sortPosts(sort) {
            currentSort = sort;
            document.querySelectorAll('.sort-btn').forEach(btn => {
                if (btn.dataset.sort === sort) {
                    btn.className = 'sort-btn text-xs font-bold text-brand-500';
                } else {
                    btn.className = 'sort-btn text-xs font-bold text-zinc-400 hover:text-zinc-600 dark:hover:text-white transition-colors';
                }
            });
            loadPosts(true);
        }

        function searchPosts() {
            // Debounce search
            clearTimeout(window.searchTimeout);
            window.searchTimeout = setTimeout(() => {
                loadPosts(true);
            }, 300);
        }

        async function loadPosts(reset = false) {
            if (isLoading) return;
            isLoading = true;

            if (reset) {
                lastDoc = null;
                document.getElementById('posts-list').innerHTML = `
                    <div class="text-center py-20">
                        <i data-lucide="loader-2" class="animate-spin inline-block text-zinc-400" size="32"></i>
                        <p class="text-zinc-400 text-sm mt-4">加载中...</p>
                    </div>
                `;
                lucide.createIcons();
            }

            try {
                let query = db.collection('itlab_posts');

                if (currentFilter !== 'all') {
                    query = query.where('category', '==', currentFilter);
                }

                switch (currentSort) {
                    case 'newest':
                        query = query.orderBy('createdAt', 'desc');
                        break;
                    case 'popular':
                        query = query.orderBy('likes', 'desc');
                        break;
                    case 'active':
                        query = query.orderBy('commentCount', 'desc');
                        break;
                }

                if (lastDoc) {
                    query = query.startAfter(lastDoc);
                }

                query = query.limit(POSTS_PER_PAGE);

                const snapshot = await query.get();
                const posts = [];
                snapshot.forEach(doc => {
                    posts.push({ id: doc.id, ...doc.data() });
                });

                if (snapshot.docs.length > 0) {
                    lastDoc = snapshot.docs[snapshot.docs.length - 1];
                }

                // Search filter (client-side)
                const searchTerm = document.getElementById('search-input').value.toLowerCase();
                const filteredPosts = searchTerm
                    ? posts.filter(p => p.title.toLowerCase().includes(searchTerm) || p.content.toLowerCase().includes(searchTerm) || (p.tags && p.tags.some(t => t.toLowerCase().includes(searchTerm))))
                    : posts;

                renderPosts(filteredPosts, reset);

                // Show/hide load more
                const loadMore = document.getElementById('load-more');
                if (snapshot.docs.length === POSTS_PER_PAGE) {
                    loadMore.classList.remove('hidden');
                } else {
                    loadMore.classList.add('hidden');
                }

            } catch (e) {
                console.error('Failed to load posts:', e);
                document.getElementById('posts-list').innerHTML = `
                    <div class="text-center py-20 text-red-400">
                        <i data-lucide="alert-circle" size="32" class="inline-block mb-4"></i>
                        <p class="text-sm">加载失败，请刷新重试</p>
                    </div>
                `;
                lucide.createIcons();
            }

            isLoading = false;
        }

        function loadMorePosts() {
            loadPosts(false);
        }

        function renderPosts(posts, replace = false) {
            const container = document.getElementById('posts-list');

            if (posts.length === 0 && replace) {
                container.innerHTML = `
                    <div class="text-center py-20">
                        <i data-lucide="message-square" size="48" class="inline-block text-zinc-300 dark:text-zinc-700 mb-4"></i>
                        <p class="text-zinc-400 text-sm">暂无帖子</p>
                        <p class="text-zinc-400 text-xs mt-2">快来发布第一个帖子吧！</p>
                    </div>
                `;
                lucide.createIcons();
                return;
            }

            const html = posts.map(post => {
                const cat = CATEGORIES[post.category] || CATEGORIES.other;
                const timeAgo = getTimeAgo(post.createdAt?.toDate());
                const isLiked = currentUser && post.likedBy?.includes(currentUser.uid);

                return `
                    <div class="group bg-white dark:bg-zinc-900/50 rounded-2xl border border-zinc-200 dark:border-white/5 hover:border-brand-500/30 hover:shadow-lg hover:shadow-brand-500/5 transition-all cursor-pointer animate-fade-in-up" onclick="showPostDetail('${post.id}')">
                        <div class="p-5">
                            <div class="flex items-start gap-4">
                                <!-- Avatar -->
                                <img src="${post.authorAvatar}" alt="" class="w-10 h-10 rounded-full flex-shrink-0">

                                <!-- Content -->
                                <div class="flex-1 min-w-0">
                                    <!-- Header -->
                                    <div class="flex items-center gap-2 mb-2 flex-wrap">
                                        ${post.isPinned ? '<span class="px-2 py-0.5 rounded text-[10px] font-bold bg-amber-100 text-amber-600 dark:bg-amber-900/30 dark:text-amber-400">置顶</span>' : ''}
                                        ${post.isFeatured ? '<span class="px-2 py-0.5 rounded text-[10px] font-bold bg-brand-100 text-brand-600 dark:bg-brand-900/30 dark:text-brand-400">精华</span>' : ''}
                                        <span class="px-2 py-0.5 rounded text-[10px] font-bold bg-${cat.color}-100 text-${cat.color}-600 dark:bg-${cat.color}-900/30 dark:text-${cat.color}-400">${cat.name}</span>
                                    </div>

                                    <!-- Title -->
                                    <h3 class="text-base font-bold mb-2 group-hover:text-brand-500 transition-colors line-clamp-1">${post.title}</h3>

                                    <!-- Preview -->
                                    <p class="text-sm text-zinc-500 dark:text-zinc-400 line-clamp-2 mb-3">${getPreviewText(post.content)}</p>

                                    <!-- Tags -->
                                    ${post.tags && post.tags.length > 0 ? `
                                        <div class="flex flex-wrap gap-1.5 mb-3">
                                            ${post.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
                                        </div>
                                    ` : ''}

                                    <!-- Footer -->
                                    <div class="flex items-center gap-4 text-xs text-zinc-400">
                                        <span class="font-medium">${post.authorName}</span>
                                        <span>${timeAgo}</span>
                                        <div class="flex items-center gap-1">
                                            <i data-lucide="heart" size="12" class="${isLiked ? 'fill-red-500 text-red-500' : ''}"></i>
                                            <span>${post.likes || 0}</span>
                                        </div>
                                        <div class="flex items-center gap-1">
                                            <i data-lucide="message-square" size="12"></i>
                                            <span>${post.commentCount || 0}</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            if (replace) {
                container.innerHTML = html;
            } else {
                container.innerHTML += html;
            }

            lucide.createIcons();
        }

        // ========== Post Detail ==========
        async function showPostDetail(postId) {
            currentPostId = postId;
            const modal = document.getElementById('post-detail-modal');
            const contentDiv = document.getElementById('post-detail-content');

            modal.classList.remove('hidden');
            contentDiv.innerHTML = `
                <div class="text-center py-20">
                    <i data-lucide="loader-2" class="animate-spin inline-block text-zinc-400" size="32"></i>
                </div>
            `;
            lucide.createIcons();

            try {
                const postDoc = await db.collection('itlab_posts').doc(postId).get();
                if (!postDoc.exists) {
                    contentDiv.innerHTML = '<div class="text-center py-20 text-red-400">帖子不存在</div>';
                    return;
                }

                const post = postDoc.data();
                const cat = CATEGORIES[post.category] || CATEGORIES.other;
                const isLiked = currentUser && post.likedBy?.includes(currentUser.uid);

                document.getElementById('detail-title').textContent = post.title;

                // Load comments
                const commentsSnapshot = await db.collection('itlab_comments')
                    .where('postId', '==', postId)
                    .orderBy('createdAt', 'asc')
                    .get();

                const comments = [];
                commentsSnapshot.forEach(doc => {
                    comments.push({ id: doc.id, ...doc.data() });
                });

                contentDiv.innerHTML = `
                    <div class="p-6">
                        <!-- Post Header -->
                        <div class="flex items-center gap-3 mb-6">
                            <img src="${post.authorAvatar}" alt="" class="w-12 h-12 rounded-full">
                            <div>
                                <p class="font-bold">${post.authorName}</p>
                                <div class="flex items-center gap-2 text-xs text-zinc-400">
                                    <span class="px-2 py-0.5 rounded text-[10px] font-bold bg-${cat.color}-100 text-${cat.color}-600 dark:bg-${cat.color}-900/30 dark:text-${cat.color}-400">${cat.name}</span>
                                    <span>${getTimeAgo(post.createdAt?.toDate())}</span>
                                </div>
                            </div>
                        </div>

                        <!-- Tags -->
                        ${post.tags && post.tags.length > 0 ? `
                            <div class="flex flex-wrap gap-2 mb-4">
                                ${post.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
                            </div>
                        ` : ''}

                        <!-- Content -->
                        <div class="markdown-body mb-6 p-4 rounded-xl bg-zinc-50 dark:bg-white/5 border border-zinc-200 dark:border-white/10">
                            ${marked.parse(post.content)}
                        </div>

                        <!-- Actions -->
                        <div class="flex items-center gap-4 pb-6 border-b border-zinc-200 dark:border-white/10">
                            <button onclick="toggleLike('${postId}')" class="flex items-center gap-2 px-4 py-2 rounded-xl ${isLiked ? 'bg-red-50 dark:bg-red-900/20 text-red-500' : 'bg-zinc-100 dark:bg-white/5 text-zinc-500'} hover:bg-red-100 dark:hover:bg-red-900/30 transition-colors text-sm font-bold">
                                <i data-lucide="heart" size="16" class="${isLiked ? 'fill-current' : ''}"></i>
                                <span>${post.likes || 0}</span>
                            </button>
                            <div class="flex items-center gap-2 text-sm text-zinc-400">
                                <i data-lucide="message-square" size="16"></i>
                                <span>${comments.length} 条评论</span>
                            </div>
                        </div>

                        <!-- Comments -->
                        <div class="mt-6 space-y-4" id="comments-list">
                            ${comments.length === 0 ? `
                                <div class="text-center py-10 text-zinc-400">
                                    <i data-lucide="message-square" size="32" class="inline-block mb-2 opacity-50"></i>
                                    <p class="text-sm">暂无评论，快来抢沙发！</p>
                                </div>
                            ` : comments.map(comment => `
                                <div class="flex gap-3 animate-slide-in">
                                    <img src="${comment.authorAvatar}" alt="" class="w-8 h-8 rounded-full flex-shrink-0">
                                    <div class="flex-1 p-3 rounded-xl bg-zinc-50 dark:bg-white/5 border border-zinc-200 dark:border-white/10">
                                        <div class="flex items-center gap-2 mb-1">
                                            <span class="text-xs font-bold">${comment.authorName}</span>
                                            <span class="text-[10px] text-zinc-400">${getTimeAgo(comment.createdAt?.toDate())}</span>
                                        </div>
                                        <p class="text-sm text-zinc-700 dark:text-zinc-300">${comment.content}</p>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;

                lucide.createIcons();

                // Highlight code blocks
                contentDiv.querySelectorAll('pre code').forEach(block => {
                    hljs.highlightElement(block);
                });

            } catch (e) {
                console.error('Failed to load post:', e);
                contentDiv.innerHTML = '<div class="text-center py-20 text-red-400">加载失败</div>';
            }
        }

        function hidePostDetail() {
            document.getElementById('post-detail-modal').classList.add('hidden');
            currentPostId = null;
        }

        async function toggleLike(postId) {
            if (!currentUser) {
                showLoginModal();
                return;
            }

            try {
                const postRef = db.collection('itlab_posts').doc(postId);
                const postDoc = await postRef.get();
                const post = postDoc.data();
                const likedBy = post.likedBy || [];
                const isLiked = likedBy.includes(currentUser.uid);

                if (isLiked) {
                    await postRef.update({
                        likes: firebase.firestore.FieldValue.increment(-1),
                        likedBy: firebase.firestore.FieldValue.arrayRemove(currentUser.uid)
                    });
                } else {
                    await postRef.update({
                        likes: firebase.firestore.FieldValue.increment(1),
                        likedBy: firebase.firestore.FieldValue.arrayUnion(currentUser.uid)
                    });
                }

                // Refresh detail
                showPostDetail(postId);
                loadPosts(true);
            } catch (e) {
                console.error('Failed to toggle like:', e);
            }
        }

        async function submitComment() {
            if (!currentUser) {
                showLoginModal();
                return;
            }

            const input = document.getElementById('comment-input');
            const content = input.value.trim();
            if (!content) return;

            try {
                await db.collection('itlab_comments').add({
                    postId: currentPostId,
                    content,
                    authorId: currentUser.uid,
                    authorName: currentUser.displayName || currentUser.email.split('@')[0],
                    authorAvatar: currentUser.photoURL || `https://ui-avatars.com/api/?name=${encodeURIComponent(currentUser.displayName || currentUser.email)}&background=5c7cfa&color=fff`,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                // Update comment count
                await db.collection('itlab_posts').doc(currentPostId).update({
                    commentCount: firebase.firestore.FieldValue.increment(1)
                });

                input.value = '';
                showPostDetail(currentPostId);
                loadPosts(true);
            } catch (e) {
                alert('评论失败: ' + e.message);
            }
        }

        // Enter to submit comment
        document.getElementById('comment-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                submitComment();
            }
        });

        // ========== Helpers ==========
        function getTimeAgo(date) {
            if (!date) return '刚刚';
            const now = new Date();
            const diff = now - date;
            const seconds = Math.floor(diff / 1000);
            const minutes = Math.floor(seconds / 60);
            const hours = Math.floor(minutes / 60);
            const days = Math.floor(hours / 24);

            if (seconds < 60) return '刚刚';
            if (minutes < 60) return `${minutes} 分钟前`;
            if (hours < 24) return `${hours} 小时前`;
            if (days < 7) return `${days} 天前`;
            if (days < 30) return `${Math.floor(days / 7)} 周前`;
            return date.toLocaleDateString('zh-CN');
        }

        function getPreviewText(content) {
            // Remove markdown syntax and get first 150 chars
            const text = content
                .replace(/#{1,6}\s/g, '')
                .replace(/\*\*(.*?)\*\*/g, '$1')
                .replace(/\*(.*?)\*/g, '$1')
                .replace(/`{1,3}[^`]*`{1,3}/g, '')
                .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1')
                .replace(/!\[([^\]]*)\]\([^)]+\)/g, '')
                .replace(/\n/g, ' ')
                .trim();
            return text.substring(0, 150) + (text.length > 150 ? '...' : '');
        }

        // ========== Stats ==========
        async function loadStats() {
            try {
                const postsSnapshot = await db.collection('itlab_posts').get();
                document.getElementById('total-posts').textContent = postsSnapshot.size;
            } catch (e) {
                console.warn('Failed to load stats:', e);
            }
        }

        // Simulate online count (in production, use Firebase Realtime Database)
        function updateOnlineCount() {
            document.getElementById('online-count').textContent = Math.floor(Math.random() * 20) + 5;
        }

        // ========== Init ==========
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            loadPosts(true);
            loadStats();
            updateOnlineCount();
            setInterval(updateOnlineCount, 30000);
        });

        // Close modals on escape
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                hideLoginModal();
                hideNewPostModal();
                hidePostDetail();
            }
        });

        // Close modals on backdrop click
        ['login-modal', 'new-post-modal', 'post-detail-modal'].forEach(id => {
            document.getElementById(id).addEventListener('click', (e) => {
                if (e.target === e.currentTarget) {
                    e.currentTarget.classList.add('hidden');
                }
            });
        });
    </script>
</body>
</html>
